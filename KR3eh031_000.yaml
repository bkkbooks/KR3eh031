形乃大傷以此養生則殃以為天下則其宗大危戒之戒之十二月人氣所在正月二月天氣始方地氣始發人氣在肝三月四月天氣正方地氣正發人氣在脾五月六月天氣盛地氣高人氣在頭七月八月陰氣始殺人氣在肺九月十月陰氣始冰地氣始閒人氣在心十一月十二月冰復地氣合人氣在腎十二多多思則神枯多念則志散多欲則忘昏多事則形勞多語則氣乏多笑則臟傷多愁則心懾多樂則語嗌多喜則志錯昏亂多怒則盲脈不定多好則專迷不理多惡則憔悴無歡十二經水足太陽外合於清水內屬於膀胱而通水道焉足少陽外合於渭水內屬於膽足陽明外合於海水內屬於胃足太陰外合於湖水內屬於脾足少陰外合於汝水內屬於腎足厥陰外合於澠水內屬於肝手太陽外合於淮水內屬於小腸而水道出焉手少陽外合於漯水內屬於三焦手陽明外合於江水內屬於大腸手太陰外合於河水內屬於肺手少陰外合於濟水內屬於心手心主外合於漳水內屬於心包凡此五臟六腑十二經水者外有源泉而內有所稟此皆內外相貫如環無端人經亦然十二經脈之終太陽之脈其正終也戴眼反折瘛瘲其色白絕汗乃出出則死矣少陽終者耳聾百節皆縱目環絕系一日半死色先青白乃死陽明終者口目動作善驚妄言色黃其上下經盛不仁則終矣少陰終者面黑齒長而垢腹脹閉塞上下不通而終矣太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通上下不通則面黑皮毛焦而終矣厥陰終者中熱嗌乾善溺心煩甚則舌卷卵縮而終矣此十二經之所敗也十二經是動所生之病手太陰肺之經是動病氣肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀是謂臂厥主肺所生病血咳嗽上氣喘渴心胸滿臑臂內前廉痛掌中熱氣盛有餘則肩背痛風汗出中風小便數欠氣虛則肩背痛寒少氣不足以息溺色變卒遺失無度手陽明大腸經是動病齒痛䪼腫主津所生病目黃口乾鼽衄喉痹肩前臑痛大指次指痛不可用氣有餘則當脈所過者熱腫虛寒慄不復手少陰心之經是動病嗌乾心痛渴而欲飲是謂臂主心所生病目黃脅痛臑臂內後廉痛厥掌中熱手太陽小腸經是動病嗌乾頷腫不可回顧肩似拔臑似折主液所生病耳聾目黃頰頷腫肩臑肘臂外後廉痛手厥陰心包絡經是動病手心熱肘臂攣急腋腫甚則胸脅支滿心中澹澹大動面赤目黃喜笑不休主心包脈所生病煩心心痛掌中熱手少陽三焦經是動病耳聾渾渾焞焞嗌腫喉痹主氣所生病汗出目銳眥皆痛耳後肩臑肘臂外皆痛小指次指不用足太陰脾之經是動病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重主脾所生病舌本痛體不能動搖食不下煩心心下急痛寒瘧溏瘕泄水閉黃疸不能臥強立股膝內腫足大指不用足陽明胃之經是動病洒洒振寒善伸數欠顏黑病至則惡人與火聞木音則惕然而驚心欲動閉戶牖而獨處甚則登高而歌棄衣而走賁鄉腹脹是為骭厥主血所生病狂瘧溫淫汗出鼻丸衄口喎唇胗頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用氣盛則身以前皆熱則有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒慄胃中寒則脹滿足少陰腎之經是動病飢不欲食面黑如炭色咳唾則有血喉鳴而喘坐而欲起目𥉂𥉂無所見心懸若飢狀氣不足則善恐心惕惕若人將捕是謂骨厥主腎所生病口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛足太陽膀胱經是動病頭痛目似脫項似拔脊痛腰似折髀不可以曲膕似結腨似裂是為踝厥主筋所生病痔瘧狂癲疾頭腦項痛目黃淚出項背腰尻膕腨腳背痛小指不用足厥陰肝之經是動病腰痛不可以俛仰丈夫潰疝婦人少腹腫甚則嗌乾面塵脫色主肝所生病胸滿嘔逆洞泄狐疝遺溺癃閉足少陽膽之經是動病口苦善太息心脅痛不能轉側甚則面色微塵體無膏澤足外反熱是為陽厥主骨所生病頭角痛頷腫目銳眥皆痛缺盆中腫痛腋下腫馬刀挾嬰汗出振寒瘧胸脅肋髀膝外至脛絕骨外踝前及諸節皆痛小指次指不用十二經絡始終流注十二經其實一脈也界而為十二分主行血氣通陰陽以榮一身者也其必始於中焦手太陰終於足厥陰而復會於手太陰故知血氣運行交通相貫未嘗間斷終而復始循環無端轉相灌溉云為流注何以始於中焦焦者原也人受天地之中以生所謂沖和其天五之氣始自中原播於百脈正難經所謂肺朝百脈是也故手太陰經脈起於中焦入大指內廉出其端手陽明大腸經起於大指次指之端俠鼻孔足陽明胃經起於鼻之交頞中入大指間出其端足太陰脾經起於大指之端注心中手少陽心經起於心中入掌後廉小指之內出其端手太陽小腸經起小指之端抵鼻至目內眥斜絡於顴足太陽膀胱經起於目內眥至小指外側出其端足少陰腎經起於小指之下注胸中手厥陰心包絡經起於胸中循小指次指出其端手少陽三焦經起於小指次指之端至目銳眥足少陽膽經起於目銳眥入大指循岐骨內貫爪甲出三毛足厥陰肝經起於大指聚毛之際上注肺中是以寅時注於肺卯時注於大腸辰時注於胃巳時注於脾午時注於心未時注於小腸申時注於膀胱酉時注於腎戌時注於心包絡亥時注於三焦子時注於膽丑時注於肝寅時復注於肺上合雞鳴下應潮水其氣與天地同流加一至則熱減一至則寒上魚際為溢入尺為覆手之三陽從手走頭足之三陽從頭走足是高能接下也足之三陰從足走腹手之三陰從腹走手是下能走上也故上下升降而為和易曰天道下濟而光明地道卑而上升又曰山澤通氣望氣寄於辛用於寅平旦始從中焦注循天之紀左旋至五而晝夜通行五十度周行八百一十丈血隨氣而上行殊不見又有潤下之意經云氣主響之升也血主濡之潤也書曰水曰潤下故血亦有下行之體如百川右行東至於海也蓋天地之形如卵橫於東南西北自然之熱岐伯曰地為人之下太虛之中又曰大氣舉之也是地如卵黃在其中矣又曰地者所以載生成之形類易曰坤厚載物德合無疆信乎天包地形如卵焉人首之上為天之天足之下為地之天人之浮於地之上如地之浮於太虛之中也氣之西始於寅終於子醜血之東根於辛納於乙相隨往來不息獨缺於乾巽為天地之門戶也戌土屬乾巳土屬累故曰六戌為天門六巳為地戶經云天地者萬物之上下左右者陰陽之道路氣血者父母也父母者天地也氣血周流於十二經總包六子於其中六氣五行是也無形者包有形也而天總包地天左行而西氣隨之百川並進而東血隨之是以處百病決死生候此而已十二經治法手少陽三焦經與足少陽膽經脈如箏絃無力時時帶數法用通因通用立此意者謂少陽春也生化萬物之始金石草木羽毛鱗介乃陰陽生化之端也故因有春分停刑之禁十二經有取決於膽之戒履端於始序則不愆故中於風者乃氣血閉而不行凡治風之藥皆用辛溫上通天氣以發散為體是元氣始出地之根蒂也此二經治有三禁不得發汗為風證多自汗也不得下下之則損陰絕其生化之源也不得利小便利之則使陽氣下陷反行陰道也其脈沉細按之洪大鼓甚而盛是內則心火為本則脈鼓甚洪大外則真陰為標其脈沉細乃寒水之體也此經標寒本熱用大黃芒硝辛苦大寒之氣味以瀉本熱也足太陽膀胱之經其本真陰其經老陽標有陽之名無陽之實謂其將變陰也其脈緊而數按之不鼓而空虛是外見虛陽而內有真陰也仲景以姜附湯久熟煎不溫服而寒服是熱因寒用蓋姜附氣味俱陽加之久久熟煎重陽之熱瀉純陰之寒是治其本以寒服者借寒治太陽標之假陽故為其假相對之治法也按其脈空虛則內伏陰寒之氣外顯大渴引飲目赤口乾面赤身熱四肢熱如火真陽將絕於外則為寒所逐而欲先絕其躁曰陰躁欲坐井中也手太陰肺之經以歲氣言之主秋主收況足太陰脾經內傷飲食其物有形亦屬於陰所主納而不出故物寒其中以食藥寒令下行也心下有痞氣仲景皆用黃連以泄之舉斯二者是寒因寒用又寒因寒也上許納豬腸中炮熟或魚腸煨熟飼之貓猴為人踏死者以蘇木依煎湯灌之狗病水調平胃散灌之又方巴豆去殼調平胃散灌之狗卒死者以葵根塞鼻可活狗遍身濃癩濃煎百部汁塗之狗為蟲蠅齧者取麻油滓遍按其身立去雞病用真麻油灌之養雞不抱法每下卵時食內夾麻子沖之自然常時下蛋養生雞以淨溫水洗濯雞腳放自然不走養雞鴨以土硫黃研細同飯拌勻喂不數日即肥豬病割去尾尖出血即愈豬瘴疫者以蘿萄或葉食之不食則難救魚遭毒急流去毒水別引新水沖之多取芭蕉搗碎置新水來處使吸之可解或以糞清澆池面亦隹新增諸證雜方一類治燒酒醉傷不醒者急用綠豆粉湯皮切片將筷開口牙用冷水送粉片下喉即醒治背發癰瘡用溫水洗淨用桑柴燒取紅炭炙瘡口待乾用白麵槎繩圍瘡口四弦上用雞子清翎毛刷傳數次即安如瘡內肉腫出易治塌內難治治骨塞喉宿喉宿砂威靈仙沙糖冷水煎請君進一服諸骨軟如綿中亦非中上下之中是中庸所謂君子而時中之意也十三陰肺開竅於鼻心開竅於舌脾開竅於口肝開竅於目腎開竅於耳耳者腎也復能聽聲聲肺主之屬金是耳中有肺也鼻者肺也復能聞臭臭心主之屬火是鼻中有心也舌者心也復能知味味脾主之屬土是舌中有脾也此三經各兼一臟目者肝也有血氣筋精肉為五輪所以貫五臟而能視也惟此經兼四臟口為脾脾屬坤土土主靜而不動故無所兼及厥陰與腎脈會於巔故云陰有十三腦為諸髓之會即海也腎主之故知陰表裡受邪故難治也十五絡經有十二絡有十五餘三絡者有陽絡是陽蹻之絡其脈起於跟中循外踝申脈穴上至風池行於背應照海穴上至咽喉交貫衝脈行於腹應乎陰蹻者捷疾也言此脈之行如動足之行步而捷疾除小絡之外有一大絡名曰大包是脾之絡故絡有十五更有胃之大絡名曰虛里貫膈絡出於左乳下其動應衣脈宗氣也是知絡又有十六焉十九問選一問曰傷寒有兩感其形何似其危使速可治否乎曰傷寒為證明是寒邪傷人傳足不傳手其始必自足太陽次陽明次少陽次太陰次少陰次厥陰自表及里循序相傳其兩感則不然因邪之表不停經入於裡一日就太陽膀胱與少陰腎俱受故見身熱煩滿而渴舌上乾燥其脈沉而大二日之傳陽明胃與太陰脾故鼻乾妄言中滿不食其脈沉而長三日之傳少陽膽與厥陰脾故耳聾囊縮厥逆水漿不入口其脈沉而弦三日而死再傳止於六日矣仲景無治法但云身體疼痛下利清穀急當救里宜四逆湯清便自調急當救表宜桂枝湯又云治有先後則知先救里才覺溫急當救表是或有可生之理濟生拔萃中雖有兩感大羌活湯治之所活者百之一二以其陰陽雙傳脈經本草針灸三世之書者子今從何是與曰聖賢謂世次相承意其授受習諸脈藥病候之情偽而無妄誤之失宋公謂徒恃世醫不究歷代經書昧乎醫之義理必有庸謬之禍又難經云色脈皮膚三者知一為下工知二為中工知三為上工據之於理為兩有焉五問曰李元象傷寒賦云誤服湯丸者食不及新特犯禁戒者死必不臘此二者何喻也曰按春秋傳云成公十年晉公夢大曆披髮及地搏膺而踴環門入戶曰殺余余得請於帝靈公覺而問桑田巫示而殺之公將食如廁陷而卒僖公五年晉賂虞假道以伐虢宮之奇諫曰虢虞之表也虢亡虞必從之公弗聽宮之奇曰虞不臘矣是冬晉滅虢師還館於虞晉遂襲滅之竊意二者喻醫有犯禁戒誤投藥餌以其不仁似二公之不久也六問曰本草公三品藥為君臣佐使東垣謂主病藥為君余為臣為佐為使二者之殊子何為據曰大全本草云上品藥一百二十種為君主養命以應天中品藥一百二十種為臣主養性以應人下品藥一百二十種為佐使主養病以應地東垣云表實麻黃表虛桂枝熱者黃連寒者附子之類為君不可令臣過於君君臣有序相與宣攝可以御邪除病矣參之於內經至真要大論云有毒無毒隨治為主又云主病之謂君佐君之謂臣應臣之謂佐使非上中下三品藥之類也愚見本草之主意所以異喜惡之名位內經之立論所以贊成方用也以攻疾之法當從內經東垣為是七問曰張長沙用大承氣湯必轉失氣則可服此失字之義其意何也曰仲景云傷寒潮熱大便六七日不行先服小承氣湯若腹中轉失氣此有燥糞方服大承氣湯蓋轉失氣是下泄氣俗云去屁也考之篇韻屎失通用竊恐傳寫者誤矢為失今從轉矢氣為文理或頗順若誠失字則於義為難訓矣八問曰何謂病要何謂治失可得聞乎曰病有虛實冷熱邪正內外謂之八要曰虛是亡血失精泄痢少食之類也曰實是狂妄燥熱大小便秘結之類也曰冷臟腑受寒也曰熱臟腑受熱也曰邪非臟腑正病也曰正非外邪所傷也曰內病不在外也曰外病不在內也若失於不審失於不識失於不信失於過時失於不知藥失於不擇醫謂之六失六失之中有一於斯病無可去之理但能審察是當無有不可治之疾苟或不然非特醫之過咎病家亦不得辭其責也九問曰七損八益何謂也曰老陽之數極於九少陽之數次於七女子為少陰之氣以少陽之數偶之故其數七老陰之數極於六少陰之數次於八男子為少陽之氣以少陰數合之故其數八蓋女子二七天真之氣降壬癸之水合月事以時而下男子二八天癸至陰陽和精氣溢瀉然陰七可損者謂女子至期海滿而血自下欲其經水以時通也陽八宜益者謂男子陰陽交會俾其中節而能固密陽氣可以保益真元由此則七損八益理可知矣十問曰臟腑要害乃刺之禁數請詳言之曰肝生於左象木旺於春春陽發生且為少陽陽長之始故曰生也肺藏於右象金旺於秋秋陰收殺且為少陰陰藏之初故曰藏也心部於表陽氣主外象火且為五臟部主故曰部也腎治於裡陰氣主內象水主治五臟故曰治也脾謂之使水穀之入運動不已故曰使也胃謂之市水穀所歸五味皆入如市之集故為市也鬲肓之上氣海居中氣者生之原生者命之主故氣陰為人之父母又云心上鬲下為肓心為陽父肺為陰母肺主於氣心主於血榮衛於身故為父母也七節之傍中有小心是謂真心神靈之宮室此八者人之所以生形之所以成故順之則福延逆之則咎至十一問曰刺傷臟腑真死之期可能必乎曰心為君主傷之一日死肺為相傅傷之三日死肝為將軍傷之五日死脾為倉廩傷之十日死腎為作強傷之六日死膽為中正傷之一日半死中腦者立死中鬲者皆為傷死中鬲傷則為五臟之氣互相剋伐其病難愈不過一歲而死非特此而然凡傷風寒並撲跌中犯者亦是也十二問曰血氣形脈谷五者皆有常有反請子明以告之曰血實脈實血虛脈虛氣實形實氣虛形虛谷盛氣盛谷虛氣虛此其常也氣盛身寒氣虛身熱脈小血多脈大血少谷入多而氣少谷入少而氣多此是失常故為反也蓋氣盛身寒得之傷寒氣虛身熱得之傷暑脈小血多留飲脾胃之中也脈大血少脈有風氣水將不入也谷入多而氣少得之有所脫血濕千下也谷入少而氣多邪在胃及肺也十三問曰鄭聲與譫語何以別之曰鄭聲對人言語鄭聲重淫亂恍惚不定此是精神元氣虛脫病屬陰也譫語口中呢喃自言人問不答乃邪熱入里屬於陽也十四問曰醫分十三科何以然也曰古之聖賢念民疾疹之苦設立醫藥起危蠲疴恐人不能專精緻志故有大小方脈婦人科產科風科眼科口齒科咽喉科正骨科金鏃科瘡腫科針灸科祝由科則數之分蓋欲其精一不二之意也十五問曰運氣精華一帙於五運六氣等論傷寒何他證而不論及其理安在曰謹按天元紀大論暨至真要大論七篇備述運氣變化勝復於病平治未嘗全論傷寒又按熱論至評熱論二篇皆明傷寒源流俱不演及運氣若以運氣全因傷寒而設必有乖於經意子當講究內經方知孰是孰非十六問曰醫家何謂五科七事請詳言之曰脈病證治及其所因謂之五科因又分外分內不外不內為三總謂之七事蓋醫之視疾必先診候患者之三部何臟腑見乎脈之表裡虛實情狀然後審是有何因寒熱秘泄之病推辨是由何因而成其證方可用何汗吐下補之法治之則能盡乎原脈以識病因病以辨證隨證以施治之良規也十七問曰病有正治有反治其意何也曰病與歲之六氣主客所臨寒熱衰旺相從相逆而然也蓋厥陰風木為歲初氣主春分前六十日其氣以溫少陰君火為二氣主春分後六十日其氣以暄少陽相火為三氣主夏至前六十日其氣以熱太陰濕土為四氣主秋分前六十日其氣以蒸陽明燥金為五氣主秋分後六十日其氣以涼太陽寒水為六氣主冬至前後六十日其氣以寒六位旋相主氣以成一歲此地之陰陽所謂靜而守位者也客氣者以當年在泉後一氣為客初氣至司天為客三氣每年轉居於其上以行歲中之天命此天之陰陽動而不息者也天命所在則有六氣之化主氣則當抵奉客之天命客勝則從主勝則逆由是天時民病應焉故病氣逆則正治從則反治正治者以寒攻熱以熱攻寒補以治虛瀉以推實是也反治者寒因熱用熱因寒用通因通用塞因塞用是也夫逆其氣以正治使其從順也從其病以反取令彼和調也又一說假使人受寒氣或傷冷物心腸作疼內投熱藥外用火熨內外熱通寒伏熱勝其疼尤甚及以涼劑治或患熱證久服寒藥藥性之寒以挾陰火其熱愈甚反以溫藥和之自汗之證數服參耆等扶陽實表之藥汗反不止以解發而愈瀉利之疾以固實腸胃藥餌服之不效反行消導而止心腹痞滿見其妨於飲食急求快利多用枳橘峻急之劑愈塞不通反用參朮等佐以香藥服之遂寬如斯之類亦反治之法尤為可法言以義治之之謂正尤不獲則權之意唯醫之聰明志達素所更嘗則其臨機療無施不可也十八問曰醫之視病望而知之者謂之神聞而知之者謂之聖問而知之者謂之工切脈而知之者謂之巧何謂也曰此醫家之四教也蓋望而知之者謂觀其神色以辨病候凡人飲食人胃變其精華之氣五味各走所喜以養五臟而五臟之精華色澤之善惡皆見乎面肝色青如翠羽如蒼壁之澤者吉如藍如草滋者危心色赤如雞冠如帛裹朱者吉如衃血如赭者危脾色黃如蟹腹如羅裹雄黃者吉如枳殼如黃土者危肺色白如豕膏如白璧之澤者吉如堊如枯骨者危腎色黑如烏羽如漆色者吉如炭如煤炲者危此五色之吉凶也春色青夏色赤長夏色黃秋色白冬色黑此五色之從四時也春得白色夏得黑色長夏得青色秋得赤色冬得黃色此五色之逆四時也素問云色澤以浮謂之易已色夭不澤謂之難已五臟乃神之舍五色乃神之表五臟之敗神氣已衰其色必夭夭者枯槁之謂能察其色以斷吉凶可謂神矣聞而知之謂聽其聲音而知其病之所在腎為聲音之根心為聲音之主肺為聲音之竅然五臟各有聲而肺屬金以司之乃聽命於心以發揚其聲耳肝音角聲直以柔心音徵聲高以長脾音宮聲大以緩肺音商聲清以揚腎音羽聲深以滑此五臟聲音之等者也肝喜叫怒心喜言笑脾好樂歌肺好哭泣腎好呻吟此五臟聲音之為疾者也聞是聲即與某臟之病相參別其五行勝負以決死生不其聖乎問屬君火正化於午對化於子是以心手少陰腎足少陰主之水隨腎至故太陽為腑則手太陽小腸足太陽膀胱也太陰之經主脾與肺蓋脾屬太陰土土生金子隨母居是以脾足太陰肺手太陰主之金隨肺至故陽明為腑則手陽明大腸足陽明胃也厥陰之經主肝與心包絡蓋肝屬木木生火子隨母居故少陽為腑則手少陽三焦足少陽膽也心包絡非臟三焦非腑且三焦為決瀆之官有名無形上合於心下合於腎主通道諸氣多為使者是故與心包絡為表裡劉溫舒曰心肺心包絡在上手經其脈從兩手起脾肝腎在下曰足經其脈從兩足起蓋手足經所以起上下也
