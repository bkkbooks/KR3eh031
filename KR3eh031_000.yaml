body:
  text: 一息呼者因陽出吸者隨陰入呼出心與肺吸入腎與肝呼吸之間脾受穀味其脈在中也一呼一吸為一息呼吸定息脈行六寸一日一夜凡一萬三千五百息脈行八百一十丈周於身漏水下百刻榮衛行陽二十五度行陰亦二十五度為一周此平人之息數也二儀天為陽主腰以上之事地為陰主腰以下之事清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣清陽出上竅濁陰出下竅清氣發腠理濁陰走五臟清陽實四肢濁陰歸六腑此天地陰陽人身應之也二陽病經曰二陽之病發心脾有不得隱曲女子不月釋之者謂男子則脾受之而味不化故少精女子則心受之而血不流故不月分心脾為男女各受立說竊獨謂不然夫二陽陽明也胃與大腸之脈也腸胃有病心脾受之發心脾猶言延及於心脾也雖然脾胃為合胃病而及脾理固宜矣大腸與心本非合也今大腸而及心何哉益胃為受納之府大腸為傳化之府食入於胃濁氣歸之飲入於胃輸精幹脾者以胃之能納大腸之能化耳腸胃既病則不能受不能化心脾何所資乎心脾既無所資則無以運化而生精血矣故腸胃有病心脾受之則男為少精女為不月矣心脾當總言男女不當分說至隱曲不月方可分說耳若如釋者之言則男之精獨資於脾而不資於心女之血獨資於心而不資於脾有是理耶益男女精血皆由五臟六腑之相養而後成可謂之男精資於脾女血資於心乎經本曰男女皆有心脾之病但在男子則隱曲之下利女子則月事之不來耳三才天地人為之三才上配天為至陽以陽極變陰故卦體坤上配地為至陰以陰極變陽故卦體乾以成天地泰也鼻之下口之上為中以配人得陰陽交泰之位居中故曰人中也惟賢人上配天以養頭下象地以養足中傍人事以養五臟故天氣通於肺地氣通於嗌風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎六徑為川腸胃為海九竅為水注之氣也三部自魚際至高骨得一寸故名曰寸部從寸至尺澤得一尺故名曰尺部寸後尺前以高骨為關故名曰關部上部法陽主胃以上至頭之有疾則是寸得之病在上中部法人主膈下至臍上之有病則是關得之病在中下部法陰主臍以下至足之有疾則是尺得之病在下也三焦三焦者水穀之道路氣之所終始也上焦者自心至膈在胃上口主納而不出其治在膻中玉堂下一寸六分直兩乳間陷者是中焦者在胃中脘不上不下主腐熟水穀其治在臍膀下焦者在臍下當膀胱上口主分別清濁出而不納以傳水穀其治在臍下二寸蓋三焦者通三氣而言之其下焦者原氣之府五臟六腑之本十二經脈之根臍下右門穴為三焦之幕幕者諸氣之所以會聚聚而復分於十二經為手少陽合手厥陰為表裡其在六氣為之相火其所王稟住居臍下當臨膀胱上口清濁由此而分出而不納粹然熏和之氣上入於中中焦之位居於中脘位成土德發越沖和翕受五穀腐熟於中變化精微內養於神外為柔軟以固於筋中焦既治具氣上烘入於膻中而為上焦其位居於胃之上口司於入納氣宇平寧襟膺開豁喜樂由此而生其氣之上上窮必返循環無已則水穀之所入者自上而中自中而下至於糟粕轉輸傳而下一無底滯故云水穀之道路氣之所終始脈經曰三焦無狀空有名寄在胸中膈相應是也三神精者神之本氣者神之主形者神之宅故神大用則歇精大用則竭氣大勞則絕但能謹於保守何致若此之竭絕也三因說蓋六氣者風寒暑濕燥熱也七情者喜怒憂思悲恐驚也若將獲得宜則怡然安泰調理失節百病生焉病疹既成須尋所由故前哲示教謂之病源夫六淫天之常氣也冒之則先自經絡流於內合於臟腑為外所因七情人之常性也動之則先自臟腑郁發外形於肌體為內所因其如飲食飢飽叫呼傷氣盡神度量疲極筋力房勞傷血陰陽違逆乃至虎狼毒蟲金瘡痤折症忤魘溺等有背常理為不內外因千般疾疢不越三條以此詳治病源愈矣四氣調神春三月此謂發陳天地俱生萬物以榮夜臥早起廣步於庭披髮緩形以使志生生而勿殺予而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變奉長者少夏三月此謂蕃秀天地氣交萬物華實夜臥早起無厭於日使志無怒使華英成秀使氣得泄若所受在外此夏氣之應養長之道也逆之則傷心秋為痎瘧奉收者少冬至重病秋三月此謂容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋形收斂神氣反秋氣平無外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飱泄奉藏者少冬三月此謂閉藏水冰地折無擾乎陽早臥晚起必待日光若伏若匿若為咳謂之上逆夫肺為諸氣之主今既有病則氣不外運又濕滯經絡故四肢痿弱無力而或厥冷也後篇所謂冬生咳嗽既言過時則與前篇之義頗不同矣夫濕氣久客不散至冬而寒氣大行肺惡寒而或受傷故濕氣得以乘虛上侵於肺發為咳嗽也觀者以此意求之經旨其或著乎四知望而知之者望見其五色以知其病故謂之神也聞而知之者聞其五音以別其病故謂之聖也問而知之者問其取因取欲五味以知其病取起所在故謂之工也切脈而知之者診其三部視其虛實以知其病在何臟腑故謂之巧也四損遠唾損氣多睡損神多汗損血疾行損筋四肢四肢者手足是也為諸陽之本若調攝得宜元氣充和則手足皆遂倘或飲食失節勞役取傷脾氣一病則不能為胃行其津液四肢不能稟水穀氣日以衰脈道不利筋骨肌肉皆無氣以生故四肢不用脾精不行則四肢懈惰也四海肝為血海若有餘則常想其身大怫然不知其取病不足亦常想其身小狹然不知其取病也膻中為氣海若有餘則氣傷胸中悅息而赤不足則氣少不足以言也腦為髓海若有餘則輕勁有力自過其度不足則腦轉耳鳴脛癥眩冒目無所見懈怠嗜臥也胃為水穀之海若有餘則腹脹滿不足則飢不受穀食也四失經脈十二絡脈三百六十五此皆人之取明知工之所循用也取以不十全者精神不專志意不理外內相失過時疑殆診不知陰陽逆從之理此治之一失也受師不卒妄作難術謬言為道更名自攻妄用針藥後遺身咎此治之二失也不適貧富貴賤之居生之厚薄形之寒溫不適飲食之宜不別人事之勇怯不知此類足以自亂不足以自明此治之三失也診病不問其始憂慮飲食之失節起居之過度或傷於毒不先言此卒持寸口何病能中妄言作名為粗取竅此治之四失也五臟主病五臟各有取主至其病證莫不隨取主而見焉面青多怒肋下痛硬咳逆目眩肢節攣急轉筋溲難臍下有動氣者肝家病也面赤喜笑舌破口乾躁煩掌熱心痛而惋膈上有動氣者心家病也面黃善思善噫善嗜中脘脹滿飲食不消身體腫重肢節癥疼怠惰嗜臥四肢不收當膈有動氣者脾家病也面白善嚏憂愁啼哭喘嗽氣逆咽喉不利灑淅惡寒時作寒熱膈右有動氣者肺家病也面黑而恐呵欠呻吟齒痛骨痿耳鳴精泄足脛寒腰脊病少腹急疼瘕泄而裡急後重膈下有動氣者腎家病也肝受病則目不能視心受病則舌不能舉脾受病則不能飲食肺受病則鼻為不利腎受病則耳不能聽經曰臟病難治也蓋肝惡風者風則筋燥急也心惡熱者熱則脈潰濁也脾惡濕者濕則肉傷而痿腫也肺惡寒者寒則氣留滯也腎惡燥者燥則精涸竭也若乃憂愁思慮易耗心神恚怒氣逆易損肝氣縱懸強志腎之牋形寒飲冷肺之害飢飽勞役脾之傷至若怒則肝氣乘矣憂則心氣乘矣恐則脾氣乘矣悲則肺氣乘矣因而喜大虛則腎氣乘矣此五志發無常分觸遇則發故視面黑脾絕而臍突唇反肺絕而毛焦氣出腎絕而腰折骨枯此五臟之氣絕絕則死不復生矣五臟已敗其命必夭夭必死矣五臟虛買心實之候口乾喜笑身熱汗出肋下兩臂膽助膺背間痛肝實之候目赤多怒頭眩耳聾痛引手兩脅小腹之下脾實之候肢體重著而不舉肉痿足不收行善瘛腳下痛腸脹尿秘而若飢肺實之候喘促咳嗽上氣鼻張肩背疼胸中滿汗出尻陰股膝脾腨胻足皆痛腎實之候腹脹脛腫喘咳身重寢汗出憎寒少氣不言骨痛飱泄小便黃此臟氣有餘謂之實也心虛之候則恍惚多驚憂煩少氣咳唾舌強胸滿腹大腳下與腰背痠疼肝虛之候目𥉂𥉂無所見耳聵聵無所聞胸脅痛筋拘攣恐懼面青如人將捕之脾虛之候吐逆泄利飲食不消腹脹腸鳴四肢無力肺虛之候呼吸少氣不能挨怠鼻涕嗌乾鼻中聲鳴喘乏咳血腎虛之候心懸如飢胸痛引脊腹大小腹痛清厥意不樂溲變䏚冷耳鳴此臟不足謂之虛也脈盛皮熱腹脹前後不通悶瞀是五實皆得汗解便利則實者活脈虛皮寒氣少前後泄利飲食不進此是五虛若得糜粥入胃泄止則虛者生矣五臟脈氣春脈弦來時厭厭聶聶如循榆葉曰平益實而滑如循長竿曰病急而勁益強如新張弓弦曰死春脈微弦曰平弦多胃氣少曰病但弦無胃氣曰死夏脈鈞來時壘壘如環如循琅玕曰平來而益數如雞舉足曰病前曲後踞如揉帶鉤曰死夏脈微鈞曰平鉤多胃氣少曰病但鉤無胃氣曰死秋脈毛來時藹藹如車蓋按之益大曰平不上不下如循雞羽曰病按之消索如風吹毛曰死秋脈微毛曰平毛多胃氣少曰病但毛無胃氣曰死冬脈石來時上大下銳濡滑如雀之啄曰平啄啄連屬其中微曲曰病來如解索去如彈石曰死冬脈微石曰平石多胃氣少曰病但石無胃氣曰死四者反者為病然氣來實強是為太過病在外氣來虛微是為不及病在內脾者州脈來和緩其平和不可得見衰乃見爾來如雀之啄如水之下漏是脾之衰見也胃者水穀之海主稟四時故皆以胃氣為本是四之變病死生之要會也假令得肝脈其外證面潔善青善怒其內證臍左有動氣按之牢若痛其病四肢滿閉淋溲便難轉筋有是者肝也無是者非也假令得心脈其外證面赤口乾喜笑其內證臍左有動氣按之牢若痛其病煩心心痛掌中熱而惋有是者心也無是者非也假令得脾脈其外證面黃善噫善思善味其內證當臍有動氣按之牢若痛其病腹脹滿食不消體重節痛怠惰嗜臥四肢不收有是者脾也無是者非也假令得肺脈其外證面白善嚏愁不樂慘淒欲哭其內證臍右有動氣按之牢若痛其病喘咳灑淅寒熱有是者肺也無是者非也假令得腎脈其外證面黑善恐善欠其內證臍下有動氣按之牢若痛其病逆氣少腹急痛泄水下重足脛寒而逆有是者腎也無是者非也五臟生成肝之合筋也其榮爪也其主肺也心之合脈也其榮色也其主腎也脾之合肉也其榮唇也其主肝也肺之合皮也其榮毛也其主心也腎之合骨也其榮發也其主脾也是故多食辛則筋急而爪枯多食鹹則脈凝泣而變色多食酸則肉胝䐢而唇揭多食苦則皮槁而毛拔多食甘則骨痛而發落此五味之所傷也生於肝如縞裹紺生於心如縞裹朱生於脾如縞裹栝蔞實生於肺如縞裹紅生於腎如縞裹紫此五臟所生之外榮也諸脈皆屬於目諸髓皆屬於腦諸筋皆屬於節諸血皆屬於心諸氣皆屬於肺此四肢八溪之朝夕也故人臥歸血於肝目受血而能視足受血而能步掌受血而能握指受血而能攝臥出而風吹之血凝於膚而為痹凝於脈為泣凝於足為厥此三者血行而不得反其空故也五臟之象可以類推五臟因音可以意識五色微診可以目察故察脈色可以萬全故肝應春屬東方甲風乙木其氣溫其味酸其音角其數三其藏魂其竅目其液淚其脈弦其臭臊其志怒其聲呼其主筋其畜雞其穀麥其變動為握其色青如翠羽者生如草滋者死為罷極之本魂之居也其華在爪其充在筋以生血氣為陽中之少陽也心應夏屬南方丙熱丁火其氣熱其味苦其音徵其數二其藏神其竅音其液汗其脈洪其臭焦其誌喜其聲言其主血其畜羊其谷黍其變動為憂其色赤如雞冠者生如草力血者死主生之本神之居也其華在面其充在血脈為陽中之太陽也脾應長夏屬中央戌濕已土其氣平其味甘其音宮其數五其藏意與智其竅口其液涎其脈緩其臭香其志思其聲歌其主肉其畜牛其谷稷其變動為噦其色黃如蟹股者生如枳殼者死為倉廩之本營之居也名曰器能化糟粕轉味而出入者也其華在唇四白其充在肌此至陰之類通於土氣也肺應秋屬西方庚燥辛金其氣燥其味辛其音商其數四其藏魄其竅鼻其液涕其臭腥其志憂其聲哭其主皮毛其畜馬其谷稻其變動為咳其色白如豕膏者生如枯骨者死主氣之本魄之處也其華在毛其充在皮為陰中之太陰也腎應冬屬北方壬癸水其氣寒其味鹹其音羽其數一其藏志與精其竅上通耳下二陰其液唾其脈沉其臭腐其志恐其聲呻其主骨髓其畜彘其谷粱其變動為慄其色黑如鳥羽者生如炲煤者死主蟄封藏之本精之處也其華在發其充在骨為陰中之少陰也五臟損益五臟以五穀為養五果為助五畜為益五菜為充五味為喜氣味合而服之以補精益氣勿使過焉過則傷其正矣是故陰之所生本在五味陰之五宮傷在五味肝欲酸過之則肝氣以肆脾氣乃絕酸走筋筋病人無多食酸宜食甘粳米棗牛肉葵皆甘也心欲苦過之則脾氣不濡胃氣乃厚咸走血血病人無多食鹹宜食酸小豆犬肉李韭皆酸也脾欲甘過之則心氣喘滿色黑腎氣不足甘走肉肉病人無多食甘宜食鹹大豆豕肉慄蘆皆咸也肺欲辛過之則筋脈沮弛精神乃耗辛走氣氣病人無多食辛宜食苦二麥羊肉杏薤皆苦也腎欲咸過之則大骨氣勞短肌心氣抑苦走骨骨病人無多食苦宜食辛黃黍雞肉桃蔥皆辛也五臟苦欲補瀉肝苦急急食甘以緩之甘草欲散急食辛以散之川芎以辛補之細辛以酸瀉之芍藥虛則陳皮生薑之類補之虛則補其母水能生木腎乃肝之母以熟地黃黃柏補之如無他證錢氏地黃丸主之瀉則白芍藥瀉之如無他證錢氏瀉青丸主之實則瀉其子心乃肝之子以甘草瀉心心苦緩急食酸收之五味子欲軟急食鹹以軟之芒硝以咸補之澤瀉以甘瀉之甘草虛以炒鹽補之虛則補其母木能生火肝乃心之母以生薑補肝如無他證錢氏安神丸主之實則甘草瀉之如無他證錢氏方中重則瀉心湯輕則導赤散脾苦濕急食苦以燥之白朮欲緩急食甘以緩之甘草以甘補之人參以苦瀉之黃連虛則甘草大棗之類補之如無他證錢氏益黃散主之虛則補其母心乃脾之母以炒鹽補心實則以枳實瀉之如無他證錢氏瀉黃散瀉之肺乃脾之子以桑白皮瀉肺脾苦氣上逆急食苦以瀉之訶子皮一作中枯黃芩欲收急食酸以收之白芍藥以辛瀉之桑白皮以酸補之虛則補其母脾乃肺之母以甘草補脾如無他證錢氏阿膠散補之實則桑白皮瀉之如無他證瀉白散主之腎乃肺之子以澤瀉瀉腎腎苦燥急食辛以潤之知母黃柏欲堅急食苦以堅之知母以苦補之黃柏以咸瀉之澤瀉虛則熟地黃黃柏補之腎本無實不可瀉錢氏只有補腎地黃丸無瀉腎之藥肺乃腎之母以五味子補肺五臟氣味補瀉肝膽味辛補酸瀉氣溫補涼瀉肝膽之經前後寒熱不問進順互換入求責法心小腸味鹹補甘瀉氣熱補寒瀉三焦命門補瀉同脾胃味甘補苦瀉氣溫涼寒熱各從其宜逆從互換入求責法肺大腸味酸補辛瀉氣涼補溫瀉腎膀胱味苦補咸瀉氣寒補熱瀉五臟相平五臟交相平也一臟不平所勝平之如木欲實金當平之之類是也故云安穀則昌絕谷則亡水去則榮散谷消則衛亡榮散衛亡神無所居仲景云水入於經其血乃成谷入於胃脈道乃行故血不可不養衛不可不溫氣溫血和榮衛將行常有天命五臟別論腦髓骨脈膽女子胞此六者地之所生也皆藏於陰而象於地故藏而不瀉名曰奇恆之府胃大腸小腸三焦膀胱此五者天之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之府此不能久留輸瀉者也魄門亦為五臟使水穀不得久藏所謂五臟者藏精氣而不瀉者也故滿而不能實六腑者傳化物而不能藏故實而不滿也所以然者水穀入口則胃實而腸虛食下則腸實而胃虛故曰實而不能滿滿而不能實也氣口何以獨為五臟主夫胃者水穀之海六腑之大源五味入口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口故五氣入鼻藏於心肺心肺有病而鼻為之不利也凡治病必察其目下所見可否也調適其脈之盈虛觀量志意之邪正及病深淺成敗之宜乃守法以治之也五精所並精氣並於心則喜並於肺則悲並於肝則憂並於脾則畏並於腎則恐是謂五並虛而相併者也如肺虛而心精並之故喜余藏仿此五郁夫五郁法者經雖為病由五運之郁所致而立然擴而充之則未嘗不可也且凡病之所起也多由於郁郁者滯而不通之義或因所乘而為郁或不因所乘而本氣自郁皆郁也豈惟五運之變能使然哉郁既非五運之變可拘則達之發之奪之泄之折之之法固可擴而充之矣可擴而充其應變不窮之理也歟姑陳於下木鬱達之達者通暢之也若肝性急怒氣逆怯脅或脹火時上炎治以苦寒辛散而不愈者則用升發之藥加以厥陰報使而縱治之又加之風入中為飱泄固不為外風之入而清氣在下為飱泄則以輕揚之劑舉而散之凡此之類皆達之之法也王氏謂吐之令其條達為木鬱達之東垣謂食塞胸中食為坤土胸為金位金主殺伐與坤土俱在於上而旺於天金能剋木故肝木生髮之氣伏於地下非木鬱而何土玄上焦陰土之物木得舒暢則鬱結去矣此木鬱達之也竊意王氏以吐訓達此不能使人無疑者也以為肺金盛而抑制肝木歟則瀉肺氣舉肝氣可矣不必吐也以為脾胃濁氣下流而少陽清氣不升歟則益胃升陽可矣不必吐也雖然木鬱固有吐之之理令以吐字總該達字則是凡木鬱皆當用吐矣其可乎哉至於東垣取謂食塞肺分為金與土在於上而剋木又不能使人無疑者夫金之剋木五行之常道固不待夫物傷而後能也且為物所傷豈有反旺之理若曰吐去其物以伸木氣乃是反為不鬱而施治非為食傷而施治矣夫因食塞胸中用吐正內經所謂其高者因而越之之義耳恐不勞引木鬱之說汨之也火鬱發之發者汗之也升舉之也如腠理外閉邪熱怫鬱則解表取汗以散之又加龍火鬱甚於內非苦寒降沉之劑可治則用升浮之藥佐以甘溫順其性而從治之使勢窮則止如東垣升陽散火湯是也凡此之類皆發之之法也土鬱奪之奪者攻下也卻而衰之也如邪熱入胃用鹹寒之劑以攻去之又如中滿腹脹濕熱內甚其又壯氣實者則攻下之其或勢盛而不能頓除者則劫奪其勢而使之衰又如濕熱為痢非力輕之劑可治者則或攻或劫以致其平而已凡此之類皆奪之之法也金鬱泄之泄者滲泄而利小便也疏通其氣也如肺金為腎水上源金受火爍其令不行原鬱而滲道閉矣宜肅清金化滋以利之又如肺氣䐜滿胸憑仰息非利肺氣之劑不足以疏通之凡此之類皆泄之之法也王氏謂滲泄解表利小便為金鬱泄之夫滲泄利小便固為泄金鬱矣無解表二字莫曉其金得非以人之皮毛屬肺無受邪為金鬱而解表為泄之乎竊為如此則凡筋病便是木鬱肉病便是土鬱解表二字未當於理今刪去且解表間於滲泄利小便之中是滲泄利小便為二治矣若以滲泄為滋肺主求以利小便為直治膀胱則直治膀胱既責於在肺何為金鬱乎是亦不通故予易之曰滲泄而利小便也水鬱折之折者制御也伐而挫之也斬殺其勢也如腫脹之病水氣浮溢是滲道以塞夫水之取不勝者土也金土氣衰弱不能制之故反受其侮治當實其土資其運化俾可以制水而不敢犯則滲道達而後愈或病勢既旺非上法取能遽制則用泄水之藥以伐而挫之或去宛陳莝開鬼門潔淨府三治備舉迭用以潮平之王氏取謂抑之制其沖逆正欲折挫其氾濫之勢也夫實者土守也泄水者攻也兼三治者廣略而決勝也守也攻也廣略也雖俱為治水之法能不審病者之虛實久近淺深集焉而妄施治之其不傾踣者寡矣且夫五郁之病固有法以治之矣然邪氣久客正氣必損金邪氣雖去正氣豈能達乎哉苟不調正氣使各安其位復其常於治郁之餘則尤未足以盡治法之妙故曰調其氣苟調其氣尤或過而未服則當益其所不勝以制之如木過者當益金金能制木則木斯服矣所不勝者所畏者也故曰過者折之以其畏也夫制物者物之所欲也制於制者物之所不欲也順其欲則喜逆其欲則惡今逆之以所惡故曰所謂瀉之王氏以咸瀉腎酸瀉肝之類為說未盡厥旨雖然自調其氣以下益經之本旨故余推其意如此若擴充為應變之用則不必盡然也五臟正病憂愁思慮則傷心怒氣逆上而不下則傷肝飲食勞倦則傷脾停寒飲冷則傷肺久坐濕地強力入水恣情縱欲則傷腎此是五臟所傷正病也五邪為病假令何以知中風然肝主色謂肝受風邪故其色當青也其病身熱脅下滿痛其脈浮大而弦何以知傷暑然心主臭故知心病傷暑當惡臭也其病身熱而煩心痛其脈浮大而散何以知飲食勞倦然脾主味虛不欲食實為欲食故知脾病飲食勞倦當喜甘也其病身熱體重嗜臥四肢不收其脈浮大而緩何以知傷寒然肺主聲故知肺病傷寒當哭也其病身熱洒洒惡寒甚則喘咳其脈浮大而澀何以知傷濕然腎主液故知腎邪入心為汗出不可止也其病身熱小腹痛足脛寒而逆其脈沉濡而大且如心病從後來者是中風肝病為虛邪從前來者是飲食勞倦脾病為實邪從所勝來者是傷寒肺病為微邪從所不勝來者是傷濕腎病為賊邪自病者五絕病治一曰自縊死氣已絕二曰牆壁屋崩死氣已絕三曰溺水死氣已絕四曰鬼魔死氣已絕五曰產乳死氣已絕並能救治可用半夏為末水丸令乾入鼻中則活為末吹鼻尤好若卒死凍死心中溫者此法亦活五勞久視傷血勞於心久臥傷氣勞於肺久坐傷肉勞於脾久立傷骨勞於腎久行傷筋勞於肝是謂五勞所傷又有五勞極見於虛勞類中五過凡未診病者必問嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精五氣留連病有所並醫工診之不審臟腑不變軀形診之而疑不知病名身體日減氣虛無精病深無力氣灑然時驚病深者以其外耗於衛內奪於榮良工所失不知病情此亦治之一過也凡欲診病者必問飲食居處暴樂暴苦皆傷精氣精氣竭絕形體毀沮暴怒傷陰暴喜傷陽厥氣上行滿脈去形愚醫治之不知補瀉不知病情精華日脫邪氣乃並此治之二過也診有三常必問貴賤封君敗傷及欲侯王故貴勢脫雖不中邪精神內傷身必敗亡始富後賤雖不傷邪皮焦筋屈痿癖為攣醫不能嚴不能動神外為柔弱亂至失常病不能移問名當合男女離絕菀結憂恐喜怒五藏空虛血氣難守工不能知何術之語嘗富大傷斬筋絕脈身體復行令澤不息故傷敗結留薄歸陽膿積寒炅粗工治之亟刺陰陽身體解散四肢轉筋死日有期醫不能明不問所發唯言死日亦為粗工此治之五過也凡此五者皆受術不通人事不明也五病所發陰病發於骨陽病發於血陰病發於肉陽病發於冬陰病發於夏是謂五發各隨其宜也五邪所亂邪入於陽則狂邪入於陰則痹陽則為顛疾搏陰則為瘖病陽入之陰則靜陰入之陽則怒是謂五亂五邪所見春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈是謂五邪皆曰命死不治五行相剋木得金而伐火得水而滅土得木而達金得火而缺水得土而絕言物類雖不可竭盡而數要之皆如五行之氣而有勝負之性分耳五法一曰治神蓋魂魄神意志以為神主知此五者以為攝養可得長生也二曰知養身蓋身當作形男女飲食節之以限風寒暑濕攝之以時有異單豹外調之害即內養形也實慈恕以愛人和塵勞而不跡有殊張毅高門之傷即外養形也內外之養周備則不期生而久生無期壽而長壽此則咸布養形之極也三曰知毒藥為貞蓋毒藥攻邪順宜而用正貞之道其在茲乎四曰制砭石小大蓋砭石用小大之形與病相當也五曰知臟腑血氣之診此論六經血氣多少聞見於後但刺多則出少則惡也精知多少補瀉萬全六經氣血多少太陽經常多血少氣少陽經常少血多氣陽明經常多氣多血少陰經常少血多氣厥陰經常多血少氣太陰經常少血多氣此天理之常數也六不治驕恣不論於理一不治輕身重財二不治衣食不能適三不治陰陽並臟氣不定四不治形羸不能服藥五不治信巫不信醫六不治有一於此則難治也六腑小腸者心之腑膽者肝之腑胃者脾之腑大腸者肺之腑膀胱者腎之腑臟惟有五腑獨有六者謂三焦也三焦者為原氣之別焉主持諸氣位著而形隱其經屬手少陽此外腑也臟亦有六謂腎有兩臟也其左為腎右為命門命門者精神之所舍男子以藏精女子以系胞其氣與腎通故言臟亦有六凡病感於六腑者則易治之七情藥性夫藥之七情有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者凡此七情和合之時用意審視當用相須相使者忌相惡相反者若有毒宜制可用相畏相殺者勿合用也故諸品之藥有陰陽配合子母兄弟根莖花實草石骨之用古者日月長遠藥在土中自養經久氣味真實百姓少欲稟氣中和感病輕微用亦詳審易為醫療合明日月短促藥在土中不容久養採取失法人亦巧詐感病厚重況又用之失審故難醫療但知診脈取方不委採藥時節出處土地新陳虛實之宜亦度審度七情故無全功實由於此七衝門唇為飛門齒為戶門會厭為吸門胃為賁門太倉下口為幽門大腸小腸為闌門下極為魄門此為七沖也七診七診之法一靜其心二忌外慮三均呼吸四輕指於皮膚間探其腑脈五微重指於肌肉間取其胃脈六沉指於骨上取其臟脈七察病人氣數之來也又法獨大者病獨小者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病凡相失之該診有七者此之謂參互不調隨其獨異以言其病爾七表脈狀浮脈者按之不足舉之有餘芤脈者中央空虛兩邊實如蔥管滑脈者來往流利以數如珠狀實脈者大而長浮沉皆得弦脈者舉之有餘按之如箏弦緊脈者按之實數似切繩狀洪泳者極大指下舉按皆滿八里脈狀微脈者若有若無沉脈者按之似有舉之全無緩脈者往來時緩少於遲脈澀脈者尋之似有舉之若無前虛後實如輕刀刮竹遲脈者呼吸三至往來極遲伏脈者重按著骨乃得濡脈者軟而細散如按水帛弱脈者形似爛綿按之欲絕輕手乃得重手全無奇經八脈凡屯八脈不拘於經故曰奇經經有十二絡有十五相隨上下何獨不拘於經然聖人圖設溝渠通利水道以備不然天雨下降溝渠滿溢當屯之時滂沛妄行聖人不能復圖也屯絡脈滿溢諸經不能復拘也然督脈起於下極之腧並於脊裡上至風府入屬於腦任脈者起於中極之下以上毛際循環里上關元至咽喉衝脈者起於氣衝並足陽明之經夾臍上行至胸中而散帶脈者起於季肋圍身一周陽僑脈者起於跟中循外踝上行於風池陰蹻脈者亦起於跟中循內踝上行至咽喉交貫衝脈陽維陰維者維絡於身蓄溢不能環流溉灌諸經者也故陽維起於諸陽之會陰維起於諸陰之交比於聖人圖設溝渠渠滿溢流於深湖故聖人不能拘通也人脈隆盛入於經脈而不環周故十二經亦不能拘之其受邪氣蓄則腫熱砭射之也然陽維維於陽陰維維於陰陰陽不能相維則恨然失志溶溶不能自收持陰蹻為病陽緩而陰急陽蹻為病陰緩而陽急衝脈為病逆氣裡急督脈為病脊強而厥任脈為病其內苦結男子七疝女子瘕聚帶脈為病腹滿腰滯溶溶若生水中陽維為病苦寒熱陰維為病苦心疼此奇經八脈之為病也八風從東方來名嬰兒風其傷人也外在於筋內舍肝也從東南方來名曰弱風其傷人也外在肌肉內舍於胃從南方來名曰大弱風其傷人也外在於脈內舍於心從西南方來名曰謀風其傷人也外在於肉內舍於脾從西方來名曰剛風其傷人也外在於皮內傷於肺從西北方來名曰折風其傷人也外在手太陽之脈內舍於小腸從北方來名曰大剛風其傷人也外在於骨內舍於腎從東北方來名曰凶風其傷人也外在腋肋內舍於大腸也八會腑會太倉臟會季肋筋會陽陵泉髓會絕骨血會膈腧骨會大杼脈會太淵氣會上焦外一筋遁兩乳內熱病在內取其冗之氣冗也九道脈狀長脈屬陽按之如持長竿過於本位短脈屬陰指下尋之不及本位虛脈屬陰指下尋之不足舉之亦然促脈屬陽指下尋之極數並居寸口漸加即死漸退即生結脈屬陰指下尋之或來或去聚而即還代脈屬陰指下動而復起再再不能自還牢脈屬陰指下尋之即有按之即無動脈屬陽指下尋之似有舉之全無再再尋之不離其處不往不來細脈屬陰指下尋之細細如線來往極微九候一者天二者地三者人因而三之三三成九以應九野色外為郊郊外為甸甸外為牧牧外為林林外為垌垌外為野言其遠也九野為九藏上部天兩額之動脈在額兩旁足少陽脈以候頭角之氣上部人耳前之動脈以候耳目之氣上部地兩頰之動脈在鼻孔中兩旁足陽明以候口齒之氣中部天手太陰肺脈在掌後寸口中以候肺中部人手少陰心脈在掌後銳骨之端神門之分以候心中部地手陽明大腸脈在手大指次指岐骨間合骨之分以候胸中之氣下部天足厥陰肝氣在毛際外趺陽下一寸半女子在太衝足大指本節後以候肝下部人足太陰脾脈在魚腹上越筋間直五里箕門之分以候脾胃之氣下部地足少陰腎脈在足內踝後跟骨上陷中以候腎氣九藏神藏者肝藏魂心藏神脾藏意與智肺藏魄腎藏精與智志以其皆神氣居之故云神藏五也形藏者一頭角二耳目三口齒四胸中也所謂形藏者皆如器外皆虛而不屈合藏於物故云形藏四也合之為九而為九藏也九針虛實之要九針最妙者為其各有所宜也然在頭身宜鑱針肉分氣滿宜員針脈氣虛少宜鍉針瀉熱出血發泄痼病宜鋒針破癰腫出膿血宜䤵針調陰陽去暴痹宜員利針治經絡中痛痹宜毫針痹深居骨解腫脊節腠之間者宜長針虛風舍於骨解皮膚之間宜大針此之謂各有所宜也其形狀在濟生拔萃方中九蟲一曰伏蟲長四分為群蟲之長二曰白蟲長一寸相生至多其母最長則殺人三曰肉蟲狀如爛杏令人煩滿噁心四曰肺蟲其狀如蠶令人咳嗽五曰胃蟲狀如暇蟆令人吐逆嘔噦六曰弱蟲狀如瓜瓣令人多唾七曰赤蟲狀如生肉令人腸鳴八曰繞蟲至微細狀如菜蟲居洞腸間多則為痔漏癰疽諸瘡無所不為九曰蛔蟲長一尺實心則殺人又有屍蟲與人俱生狀如馬尾或如薄筋依脾而居長三寸許大害於人然諸蟲多因臟氣虛弱勞熱而生有血鱉蟲亦因胃虛食物消化不盡瘀積而生食人心腹疼甚噁心口吐清水面黃體瘦好吃泥灰生米茶鹽薑椒等物用殺蟲藥餌治之其蟲自初一日至初五日頭向上服之最驗惟有肺蟲居肺葉間蝕肺系故成勞瘵咯血聲嘶及屍蟲通神藥所不到治之為難又有應聲蟲每語喉中如有物和聲相應者有人教誦本草至雷丸則無聲乃頓服數枚而愈後人俱以是法治效九竅夫五藏者上下開於九竅也故陽竅七在上陰竅二在下以鼻為肺之閶闔吸引五氣內藏和平香臭必辨目為肝之竅臟氣充實精明全備目舉而黑白分口為脾之候脾氣和而忻知穀味舌者心之應神宇泰定食入於口五味皆知腎氣上通於耳下貫二陰元氣內充上而五音必辨下則傳送安調其五臟各得其平者然也倘失其和則氣壅而九竅不通矣若六腑之氣澀滯不流榮血壅聚發為癰疽也九氣為病怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收熱則氣泄驚則氣亂勞則氣耗思則氣結九氣不同何病之生也怒則氣逆甚則嘔血及飱泄故氣上矣喜則志和氣達榮衛通泰故氣緩矣悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣恐則精卻卻則上焦閉閉則氣遠遠則下焦脹故氣下矣寒則腠理閉氣不行故氣收矣熱則腠理開榮衛通汗大泄故氣泄矣驚則心無所倚神無所歸慮無所定故氣亂矣勞則喘息自汗出外內皆越而氣耗矣思則心有所存神有所歸故氣結矣十變一脈為十變者何五邪剛柔相逢之義也假令心脈急甚肝邪干心心脈微急者膽邪干小腸也心脈大甚者心邪自干心心脈微大者小腸邪自干小腸心脈緩甚者脾邪干心心脈微緩者胃邪干小腸心脈澀甚者肺邪干心心脈微澀者大腸邪干小腸心脈沉甚者腎邪干心心脈微沉者膀胱邪干小腸五臟各有剛柔邪故今一脈軋變為十也十法治病下則疏豁閉塞補則益助虛乏灸則起陰通陽針則行榮引衛導引則可以逐客邪於關節按摩則可以驅浮淫於肌肉蒸熨則闢陰澡洗則宣陽悅豫則爽神和緩則安氣十二經絡手少陰心經絡之脈起於心中出屬心系下膈絡小腸其支者從心系上俠咽系目系其直者復從心系卻上肺出腋下下循臑內後廉行太陰心主之後下肘內廉循臂內後廉抵掌後兌骨之端入掌內後廉循小指之內出其端手太陽小腸經絡之脈起於小指之端循手外側上腕骨出踝中直上循臂骨下廉出肘內側兩骨之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支別者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴足厥陰肝經之脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中環陰器抵小腹俠胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與腎脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺中足少陽膽經之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩下卻交出手少陽之後入缺盆其支別者從耳後入耳中出走耳前至目銳眥後其支者別目銳眥下大迎合手少陽抵於䪼交頰車下頸合缺盆下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外轉骨之前直下抵絕骨之端下出外踝之前循足跗上入小指次指之間其支者從跗上入大指循岐骨內出其端還入爪甲出三毛足太陰脾經絡之脈起於大指之端循指內側白肉際過覈骨後上內踝前廉上腨內循胻骨後交出厥陰之前上循膝股內前廉入腹屬脾絡胃上膈俠喉連舌本散舌下其支別者復從胃別上膈注心中足陽明胃經絡之脈起於鼻交額中下循鼻外入上齒中還出俠口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支別者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直行者從缺盆下乳內廉下俠臍入氣街中其支者起胃下口循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循胻外廉下足跗入中指內間其支者下膝下三寸而別以下人中指外間其支者別跗上入大指間出其端手太陰肺經絡之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大